<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Usuarios</h3>
</div>

<div class="card shadow-sm">
    <div class="card-body">

        <!-- Toolbar -->
        <div class="d-flex justify-content-between align-items-center mb-3">
            <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#modalNuevoUsuario">
                <i class="bi bi-plus-lg me-1"></i> Nuevo Usuario
            </button>
            <div class="input-group" style="width: 250px;">
                <input type="text" class="form-control" placeholder="Buscar usuario...">
                <span class="input-group-text"><i class="bi bi-search"></i></span>
            </div>
        </div>

        <!-- Tabla -->
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Plan</th>
                    <th>Estado</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                @for (user of users; track user._id) {
                <tr>
                    <td class="fw-semibold">{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ user.role }}</td>
                    <td>{{ user.plan ?? 'None' }}</td>
                    <td> {{ user.planStatus }} </td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-warning me-1">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                }
            </tbody>
        </table>

    </div>
</div>


<!-- Modal Nuevo Usuario -->
<div class="modal fade" id="modalNuevoUsuario" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Nuevo Usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" [(ngModel)]="newUser.name" placeholder="Nombre completo">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" [(ngModel)]="newUser.email" placeholder="correo@ejemplo.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" class="form-control" [(ngModel)]="newUser.password" placeholder="••••••••">
        </div>
        <div class="mb-3">
          <label class="form-label">Rol</label>
          <select class="form-select" [(ngModel)]="newUser.role">
            <option value="user">User</option>
            <option value="trainer">Trainer</option>
            <option value="admin">Admin</option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-danger" (click)="createUser()">Crear Usuario</button>
      </div>

    </div>
  </div>
</div>
